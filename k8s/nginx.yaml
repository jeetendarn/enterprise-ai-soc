apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx
  namespace: enterprise-ai-soc

spec:
  replicas: 1

  selector:
    matchLabels:
      app: nginx

  template:

    metadata:
      labels:
        app: nginx

    spec:

      containers:

      - name: nginx

        image: jeetendarn/enterprise-ai-soc-nginx:v1

        imagePullPolicy: Always

        ports:

        - containerPort: 80



apiVersion: v1

kind: Service

metadata:

  name: nginx

  namespace: enterprise-ai-soc

spec:

  type: NodePort

  selector:
    app: nginx

  ports:

  - port: 80

    targetPort: 80