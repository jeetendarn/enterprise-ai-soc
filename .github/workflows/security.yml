name: Security Scan

on:
  push:
    branches:
      - main

  pull_request:

jobs:

  security:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: |
          docker build -t enterprise-ai-soc-backend ./backend

      - name: Trivy Backend Scan
        uses: aquasecurity/trivy-action@v0
        with:
          image-ref: enterprise-ai-soc-backend
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Filesystem Scan
        uses: aquasecurity/trivy-action@v0
        with:
          scan-type: fs
          scan-ref: .

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: .