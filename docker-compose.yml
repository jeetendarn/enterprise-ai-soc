version: "3.9"

services:

  postgres:

    image: postgres:17

    container_name: soc-postgres

    restart: always

    environment:
      POSTGRES_DB: enterprise_ai_soc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:

    build:
      context: ./backend

    container_name: soc-backend

    restart: always

    ports:
      - "8000:8000"

    depends_on:
      - postgres

    env_file:
      - ./backend/.env

    volumes:
      - ./backend:/app

  frontend:

    build:
      context: ./frontend

    container_name: soc-frontend

    restart: always

    ports:
      - "5173:5173"

    depends_on:
      - backend

    volumes:
      - ./frontend:/app

volumes:

  postgres_data: